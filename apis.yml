  - type: SDKs
    url: https://pypi.org/project/PennyLane-Lightning/
  description: The Lightning plugin family — `lightning.qubit` (C++ CPU), `lightning.gpu` (cuQuantum), and
    `lightning.kokkos` (multi-architecture HPC) — provides Xanadu's fast state-vector and tensor-network
    simulators for PennyLane. Designed for 20+ qubit research workflows and HPC integration.
