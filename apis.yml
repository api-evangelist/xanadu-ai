  description: PennyLane is the flagship open-source Python framework for quantum differentiable programming —
    train and optimize variational quantum circuits with the same automatic differentiation engines used in
    classical machine learning. PennyLane unifies quantum machine learning, quantum chemistry, and hybrid
    quantum-classical workflows behind a single device-abstraction API, interoperates with NumPy, PyTorch,
    JAX, and TensorFlow/Keras, and runs against 40+ simulators and hardware backends through its plugin
    ecosystem. Apache 2.0 licensed. 3,200+ GitHub stars.
- aid: xanadu-ai:pennylane-catalyst
  name: PennyLane Catalyst
  tags:
  - Compilers
  - JIT
  - MLIR
  - QIR
  humanURL: https://docs.pennylane.ai/projects/catalyst
  properties:
  - type: Documentation
    url: https://docs.pennylane.ai/projects/catalyst/en/stable/
  - type: GitHubRepository
    url: https://github.com/PennyLaneAI/catalyst
  - type: SDKs
    url: https://pypi.org/project/PennyLane-Catalyst/
  description: Catalyst is a JIT compiler for hybrid quantum programs written in PennyLane. The `@qjit` decorator
    compiles entire quantum-classical workflows — including conditionals, loops, and gradients — to a custom
    MLIR quantum dialect, then lowers to LLVM and QIR for execution against Lightning, AWS Braket, and an
    expanding set of QPUs. Apache 2.0.
