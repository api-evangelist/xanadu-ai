- name: Features
  type: Features
  data:
  - name: Open-source quantum differentiable programming
    description: Train variational quantum circuits with PyTorch / JAX / TensorFlow / NumPy autodiff
      through PennyLane.
  - name: Hardware-agnostic device API
    description: Swap between 40+ simulators and QPU backends behind a single `qml.device(...)` interface.
  - name: JIT compilation of hybrid programs
    description: Catalyst compiles quantum + classical control flow to MLIR / LLVM / QIR for fast,
      gradient-aware execution.
  - name: High-performance simulators
    description: Lightning (CPU/C++), Lightning-GPU (cuQuantum), Lightning-Kokkos (HPC), and Jet
      (tensor-network) scale to research-grade workloads.
  - name: Quantum chemistry built in
    description: |-
      `qml.qchem` provides differentiable Hartree-Fock, VQE, and Hamiltonian construction.
  - name: Curated datasets and codebook
    description: PennyLane Datasets and the Xanadu Quantum Codebook deliver standardized benchmarks and an
      interactive learning curriculum.
  - name: Photonic continuous-variable tooling
    description: Strawberry Fields, MrMustard, The Walrus, Blackbird, and FlamingPy form a complete CV
      photonic stack — simulation, optimization, fault-tolerant codes.
  - name: Hardware milestones
    description: X8 (8-mode squeezed-light chip), Borealis (216-mode programmable Gaussian boson sampler;
      Nature 2022 quantum advantage), Aurora (modular networked photonic computer, 2025).
- name: UseCases
  type: UseCases
  data:
  - name: Quantum Machine Learning
    description: Variational classifiers, quantum kernels, generative quantum models, hybrid
      quantum-classical neural networks.
  - name: Quantum Chemistry
    description: Molecular ground-state energies via VQE, differentiable Hartree-Fock, resource estimation
      for fault-tolerant electronic-structure algorithms.
  - name: Quantum Algorithm Research
    description: Rapid prototyping of QAOA, amplitude estimation, quantum signal processing, and
      error-correction protocols.
  - name: Hybrid HPC Workloads
    description: Catalyst + Lightning-GPU / Lightning-Kokkos for scaling hybrid quantum-classical workloads
      on HPC clusters.
  - name: Quantum Education
    description: PennyLane Codebook, demos, and datasets for university courses and self-directed
      learners.
  - name: Hardware Benchmarking
    description: Cross-vendor execution and benchmarking via the plugin ecosystem (IBM, IonQ, Rigetti, AWS
      Braket, AQT, Quantinuum).
- name: Integrations
  type: Integrations
  data:
  - name: IBM Quantum / Qiskit
    description: |-
      `pennylane-qiskit` plugin — run circuits on IBM Quantum hardware and Qiskit simulators.
  - name: AWS Braket
    description: Amazon Braket plugin — execute on Rigetti, IonQ, OQC, Quera, and the SV1/DM1/TN1 managed
      simulators.
  - name: Google Cirq
    description: |-
      `pennylane-cirq` plugin for Cirq simulators and Google Quantum AI workflows.
  - name: Rigetti Forest
    description: |-
      `pennylane-rigetti` plugin for Rigetti QPUs, QVM, and wavefunction simulator.
  - name: IonQ
    description: |-
      `PennyLane-IonQ` plugin for IonQ simulators and trapped-ion hardware.
  - name: AQT (Alpine Quantum Technologies)
    description: |-
      `pennylane-aqt` plugin for AQT ion-trap hardware.
  - name: Quantinuum (Honeywell)
    description: |-
      `pennylane-honeywell` plugin for Quantinuum / Honeywell ion-trap hardware.
  - name: Microsoft Q# / QDK
    description: |-
      `PennyLane-qsharp` plugin for the Microsoft Quantum Development Kit full state simulator.
  - name: Qulacs
    description: |-
      `pennylane-qulacs` plugin — high-performance C++ simulator.
  - name: ProjectQ
    description: |-
      `pennylane-pq` plugin — IBM, simulator, and classical-simulator devices via ProjectQ.
  - name: Strawberry Fields
    description: |-
      `pennylane-sf` plugin — drive Xanadu's continuous-variable photonic simulators.
  - name: PyTorch
    description: PennyLane's `torch` interface for gradient-based optimization with PyTorch tensors.
  - name: JAX
    description: PennyLane's `jax` interface and Catalyst JAX support.
  - name: TensorFlow / Keras
    description: PennyLane's `tf` interface for seamless integration with TensorFlow models.
  - name: NumPy / Autograd
    description: Default PennyLane interface for classical autodiff with NumPy.
