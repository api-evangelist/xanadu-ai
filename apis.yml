aid: xanadu-ai
name: Xanadu
description: Xanadu is a Canadian photonic quantum computing company building room-temperature, fault-tolerant, scalable quantum computers based on photonic continuous-variable (CV) and Gaussian boson sampling architectures. Xanadu maintains a large open-source software stack — most notably PennyLane (the cross-platform framework for quantum differentiable programming, quantum chemistry, and quantum machine learning), Catalyst (a JIT/MLIR compiler for hybrid quantum-classical programs), the PennyLane Lightning family of high-performance state-vector and tensor-network simulators, the PennyLane Plugin ecosystem (Qiskit/IBM, AWS Braket, Cirq, Rigetti, IonQ, AQT, Quantinuum, Qulacs, ProjectQ, and Xanadu's own Strawberry Fields), MrMustard, Jet, FlamingPy, The Walrus, Blackbird (the CV quantum assembly language), XIR, and the Xanadu Quantum Codebook. Xanadu hardware milestones include the X8 photonic chip, Borealis (quantum advantage demonstration on a 216-mode programmable Gaussian boson sampler), and Aurora (the first modular, networked photonic quantum computer combining server racks and kilometres of optical fibre). The Xanadu Cloud — the original photonic-hardware-as-a-service offering with REST/Python/CLI access to Borealis and X8 — has been retired (the `xanadu-cloud-client` and Strawberry Fields repos are archived), and Xanadu's developer-facing surface today centres on the PennyLane Python ecosystem and hardware execution via PennyLane plugins against partner cloud platforms.
