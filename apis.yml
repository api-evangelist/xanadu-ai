  - type: GitHubRepository
    url: https://github.com/XanaduAI/strawberryfields
  - type: SDKs
    url: https://pypi.org/project/StrawberryFields/
  description: Strawberry Fields is Xanadu's full-stack Python library for designing, simulating, and optimizing
    continuous-variable (CV) photonic quantum circuits. Historically the bridge from Python to Xanadu's X8 and
    Borealis hardware via the Xanadu Cloud. The repository is now archived following the Xanadu Cloud
    retirement; remains useful as an educational/simulator stack for CV quantum optics.
